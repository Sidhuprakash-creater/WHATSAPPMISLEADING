# Render Blueprint for MisLEADING Backend
services:
  - type: web
    name: misleading-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./misleading.db
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
